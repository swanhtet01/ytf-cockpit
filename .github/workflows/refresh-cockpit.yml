name: Refresh YTF ops cockpit

on:
  schedule:
    - cron: '30 0 * * *'
    - cron: '30 11 * * *'
  workflow_dispatch:

concurrency:
  group: refresh-cockpit
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Restore Drive cache
        uses: actions/cache@v4
        with:
          path: ytf-ops-tools/data/drive-cache
          key: drive-cache-${{ github.run_id }}
          restore-keys: |
            drive-cache-

      - name: Pull Drive workbooks
        working-directory: ytf-ops-tools
        env:
          GOOGLE_SA_KEY: ${{ secrets.GOOGLE_SA_KEY }}
        run: |
          mkdir -p data/drive-cache data/raw out
          node pull-drive.mjs

      - name: Fetch manual entries from app
        env:
          PANEL_TOKEN: ${{ secrets.PANEL_TOKEN_YTF }}
        run: |
          mkdir -p ytf-ops-tools/data/manual-entries
          curl -sf -H "x-panel-token: $PANEL_TOKEN" \
            https://ytf.supermega.dev/api/entries \
            -o /tmp/ytf-raw.json || echo '{"entries":[]}' > /tmp/ytf-raw.json
          node -e "
            const d=JSON.parse(require('fs').readFileSync('/tmp/ytf-raw.json','utf8'));
            const entries=(d.entries||[]).map(e=>({
              kind:e.entry_type||'other',
              date:(e.created_at||'').slice(0,10),
              captured_via:'ytf-app',
              owner:e.owner||e.role,
              status:e.status,
              fields:{what:e.what,where:e.where,area:e.plant+'/'+e.department,...JSON.parse(e.payload_json||'{}')},
              source_text:e.what||e.where
            }));
            require('fs').writeFileSync('ytf-ops-tools/data/manual-entries/ytf-app-entries.json',JSON.stringify(entries,null,2));
            console.log('entries fetched:',entries.length);
          "

      - name: Rebuild feed
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p feed
          node refresh.mjs --no-llm

      - name: Publish feed as static
        run: |
          for f in ytf-ops.json ytf-dashboard.json ytf-claims.json ytf-procurement.json ytf-raw-material.json; do
            cp "feed/$f" "public/$f" 2>/dev/null || true
          done

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set +e
          npx --yes vercel@latest deploy --prod --yes \
            --token "$VERCEL_TOKEN" \
            2>&1 | tee /tmp/vercel-out.txt
          DEPLOY_EXIT=${PIPESTATUS[0]}
          set -e
          cat /tmp/vercel-out.txt
          URL=$(grep -oE 'https://supermega-remote-[a-z0-9.]+-swanhtet01s-projects\.vercel\.app|https://supermega-remote\.vercel\.app' /tmp/vercel-out.txt | head -1)
          if [ -n "$URL" ]; then
            npx --yes vercel@latest alias set "$URL" ops.supermega.dev \
              --token "$VERCEL_TOKEN" || true
            echo "Aliased to ops.supermega.dev"
          fi
          exit $DEPLOY_EXIT
