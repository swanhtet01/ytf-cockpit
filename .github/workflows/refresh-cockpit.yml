name: Refresh YTF ops cockpit

on:
  schedule:
    - cron: '0 */3 * * *'   # every 3 hours (was twice daily) — fresher stock/production, fewer blind spots
  workflow_dispatch:         # + on-demand: a "Refresh now" button / api/sync-ops can dispatch this

concurrency:
  group: refresh-cockpit
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install deps (SheetJS for robust .xls/.xlsx parsing)
        run: npm install --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Restore Drive cache
        uses: actions/cache@v4
        with:
          path: ytf-ops-tools/data/drive-cache
          key: drive-cache-${{ github.run_id }}
          restore-keys: |
            drive-cache-

      - name: Pull Gmail threads
        working-directory: ytf-ops-tools
        env:
          GMAIL_CLIENT_ID:     ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
        run: |
          mkdir -p data
          node pull-gmail.mjs || true

      - name: Pull Drive workbooks
        working-directory: ytf-ops-tools
        env:
          GOOGLE_SA_KEY: ${{ secrets.GOOGLE_SA_KEY }}
        run: |
          mkdir -p data/drive-cache data/raw out
          node pull-drive.mjs

      - name: Crawl full Drive tree (per-plant auto-discovery)
        working-directory: ytf-ops-tools
        env:
          GOOGLE_SA_KEY: ${{ secrets.GOOGLE_SA_KEY }}
        run: |
          node crawl-drive.mjs || echo "crawl-drive failed (non-fatal) — generators fall back gracefully"

      - name: Fetch manual entries from app
        env:
          PANEL_TOKEN: ${{ secrets.PANEL_TOKEN_YTF }}
        run: |
          mkdir -p ytf-ops-tools/data/manual-entries
          curl -sf -H "x-panel-token: $PANEL_TOKEN" \
            https://ytf.supermega.dev/api/entries \
            -o /tmp/ytf-raw.json || echo '{"entries":[]}' > /tmp/ytf-raw.json
          node -e "
            const d=JSON.parse(require('fs').readFileSync('/tmp/ytf-raw.json','utf8'));
            const entries=(d.entries||[]).map(e=>({
              kind:e.entry_type||'other',
              date:(e.created_at||'').slice(0,10),
              captured_via:'ytf-app',
              owner:e.owner||e.role,
              status:e.status,
              fields:{what:e.what,where:e.where,area:e.plant+'/'+e.department,...JSON.parse(e.payload_json||'{}')},
              source_text:e.what||e.where
            }));
            require('fs').writeFileSync('ytf-ops-tools/data/manual-entries/ytf-app-entries.json',JSON.stringify(entries,null,2));
            console.log('entries fetched:',entries.length);
          "

      - name: Rebuild feed
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SA_KEY: ${{ secrets.GOOGLE_SA_KEY }}
        run: |
          mkdir -p feed
          node refresh.mjs --no-llm

      - name: Upload feed to Vercel Blob
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: |
          node -e "
            const fs = require('fs');
            const files = ['ytf-ops.json','ytf-dashboard.json','ytf-claims.json','ytf-procurement.json','ytf-raw-material.json'];
            const token = process.env.BLOB_READ_WRITE_TOKEN;
            if (!token) { console.error('BLOB_READ_WRITE_TOKEN not set'); process.exit(1); }
            (async () => {
              for (const f of files) {
                const path = 'feed/' + f;
                if (!fs.existsSync(path)) { console.log('skip (missing):', f); continue; }
                const body = fs.readFileSync(path);
                const r = await fetch('https://blob.vercel-storage.com/ytf-feed/' + f, {
                  method: 'PUT',
                  headers: {
                    Authorization: 'Bearer ' + token,
                    'x-api-version': '7',
                    'x-add-random-suffix': '0',
                    'content-type': 'application/json',
                  },
                  body,
                });
                if (!r.ok) { const t = await r.text(); console.error('ERR', f, r.status, t.slice(0,200)); process.exit(1); }
                const j = await r.json();
                console.log('uploaded:', f, '->', j.url.slice(0,70));
              }
            })().catch(e => { console.error('blob upload error:', e.message); process.exit(1); });
          "
