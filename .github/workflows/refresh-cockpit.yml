name: Refresh YTF ops cockpit

on:
  schedule:
    - cron: '30 0 * * *'
    - cron: '30 11 * * *'
  workflow_dispatch:

concurrency:
  group: refresh-cockpit
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Restore Drive cache
        uses: actions/cache@v4
        with:
          path: ytf-ops-tools/data/drive-cache
          key: drive-cache-${{ github.run_id }}
          restore-keys: |
            drive-cache-

      - name: Pull Drive workbooks
        working-directory: ytf-ops-tools
        env:
          GOOGLE_SA_KEY: ${{ secrets.GOOGLE_SA_KEY }}
        run: |
          mkdir -p data/drive-cache data/raw out
          node pull-drive.mjs

      - name: Fetch manual entries from app
        env:
          PANEL_TOKEN: ${{ secrets.PANEL_TOKEN_YTF }}
        run: |
          mkdir -p ytf-ops-tools/data/manual-entries
          curl -sf -H "x-panel-token: $PANEL_TOKEN" \
            https://ytf.supermega.dev/api/entries \
            -o /tmp/ytf-raw.json || echo '{"entries":[]}' > /tmp/ytf-raw.json
          node -e "
            const d=JSON.parse(require('fs').readFileSync('/tmp/ytf-raw.json','utf8'));
            const entries=(d.entries||[]).map(e=>({
              kind:e.entry_type||'other',
              date:(e.created_at||'').slice(0,10),
              captured_via:'ytf-app',
              owner:e.owner||e.role,
              status:e.status,
              fields:{what:e.what,where:e.where,area:e.plant+'/'+e.department,...JSON.parse(e.payload_json||'{}')},
              source_text:e.what||e.where
            }));
            require('fs').writeFileSync('ytf-ops-tools/data/manual-entries/ytf-app-entries.json',JSON.stringify(entries,null,2));
            console.log('entries fetched:',entries.length);
          "

      - name: Rebuild feed
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p feed
          node refresh.mjs --no-llm

      - name: Upload feed to Vercel Blob
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: |
          npm install --prefix /tmp/blobupload @vercel/blob 2>/dev/null
          node -e "
            const {put} = require('/tmp/blobupload/node_modules/@vercel/blob');
            const fs = require('fs');
            const files = ['ytf-ops.json','ytf-dashboard.json','ytf-claims.json','ytf-procurement.json','ytf-raw-material.json'];
            (async () => {
              for (const f of files) {
                const path = 'feed/' + f;
                if (!fs.existsSync(path)) { console.log('skip (missing):', f); continue; }
                const content = fs.readFileSync(path, 'utf8');
                const result = await put('ytf-feed/' + f, content, {
                  access: 'public', addRandomSuffix: false, contentType: 'application/json'
                });
                console.log('uploaded:', f, '->', result.url.slice(0,60));
              }
            })().catch(e => { console.error('blob upload error:', e.message); process.exit(1); });
          "
